name: Deploy Firestore Rules and Indexes on merge

on:
  push:
    branches:
      - main
    paths:
      - firestore.rules
      - firestore.indexes.json
      - firebase.json
      - .firebaserc

jobs:
  deploy_firestore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Configure Firebase service account
        run: |
          cat > "$HOME/firebase-service-account.json" << 'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LEEHJ_EDU }}
          EOF
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy Firestore rules and indexes
        run: firebase deploy --only firestore:rules,firestore:indexes --project leehj-edu
